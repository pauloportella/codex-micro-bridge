[platformio]
default_envs = m5stickc-plus2

[env:m5stickc-plus2]
platform = espressif32@6.12.0
board = m5stick-c
framework = arduino
; The Plus2's CH9102 adapter is reliable at this rate on macOS. Higher rates
; produced corrupted esptool packets on the connected unit.
upload_speed = 115200
monitor_speed = 115200
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608
board_build.partitions = default_8MB.csv
build_flags =
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
lib_deps =
  m5stack/M5Unified@0.2.18
